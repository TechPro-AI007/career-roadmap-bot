<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Pathfinder & Roadmap Guide</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #ffffff;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 550px;
            width: 90%;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #00ffcc;
        }
        p {
            font-size: 1.1rem;
            color: #e0e0e0;
            line-height: 1.6;
        }
        .icon {
            font-size: 4.5rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🚀🎯🧭</div>
        <h1>AI Career Pathfinder</h1>
        <p>Welcome! Ready to map out your future? Click the chat icon in the bottom right corner to get a complete step-by-step learning roadmap, tool guides, and job market insights for your dream career field.</p>
    </div>

    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/06/18/13/20260618133650-UZHX9N7N.js" defer></script>

</body>
</html>
